services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: sailor
      MYSQL_USER: sailor
      MYSQL_PASSWORD: sailor123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sailor", "-psailor123"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sailor
      SPRING_DATASOURCE_USERNAME: sailor
      SPRING_DATASOURCE_PASSWORD: sailor123

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mysql_data:
